services:

  # зҢ«е’Әе‘јеҗёзӣ‘жҠӨ
  cat_monitor:
    build: ..
    container_name: cat_monitor
    restart: unless-stopped
    network_mode: host
    environment:
      - TZ=Asia/Shanghai
      - PYTHONUNBUFFERED=1
      - CAMERA_URL=${CAMERA_URL:-http://127.0.0.1:18080/video}
      - FEISHU_APP_ID=${FEISHU_APP_ID}
      - FEISHU_APP_SECRET=${FEISHU_APP_SECRET}
      - FEISHU_CHAT_ID=${FEISHU_CHAT_ID}
    volumes:
      - ./data:/app/data

  # frp жңҚеҠЎз«Ҝ вҖ” жҺҘж”¶жүӢжңәи§Ҷйў‘жөҒз©ҝйҖҸ
  frps:
    image: snowdreamtech/frps
    container_name: frps
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./frps/frps.toml:/etc/frp/frps.toml
